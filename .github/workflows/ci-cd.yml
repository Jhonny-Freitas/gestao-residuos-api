name: CI/CD Pipeline - Gestao de Residuos

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  JAVA_VERSION: '21'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ============================================================
  # JOB 1: BUILD
  # ============================================================
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Build com Maven
        run: mvn clean package -DskipTests

      - name: Upload artefato JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1

  # ============================================================
  # JOB 2: TESTES AUTOMATIZADOS
  # ============================================================
  test:
    name: Testes Automatizados
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Executar testes
        run: mvn test

      - name: Publicar relatorio de testes
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7

  # ============================================================
  # JOB 3: DEPLOY STAGING
  # Disparado apenas em push para branch 'develop'
  # ============================================================
  deploy-staging:
    name: Deploy - Staging
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: staging
      url: http://localhost:8081/swagger-ui.html
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extrair metadados Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=staging
            type=sha,prefix=staging-

      - name: Build e push imagem Docker (staging)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Deploy em Staging
        run: |
          echo "============================================"
          echo "  DEPLOY STAGING CONCLUIDO"
          echo "============================================"
          echo "Imagem  : ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging"
          echo "Ambiente: staging"
          echo "Porta   : 8081"
          echo "Profile : staging"
          echo ""
          echo "Para subir localmente:"
          echo "  docker-compose -f docker-compose.staging.yml up -d"
          echo "============================================"

  # ============================================================
  # JOB 4: DEPLOY PRODUCTION
  # Disparado apenas em push para branch 'main'
  # Requer aprovacao manual via GitHub Environments
  # ============================================================
  deploy-production:
    name: Deploy - Production
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: http://localhost:8080/swagger-ui.html
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extrair metadados Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=production
            type=sha,prefix=prod-

      - name: Build e push imagem Docker (production)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Deploy em Production
        run: |
          echo "============================================"
          echo "  DEPLOY PRODUCTION CONCLUIDO"
          echo "============================================"
          echo "Imagem  : ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo "Ambiente: production"
          echo "Porta   : 8080"
          echo "Profile : prod"
          echo ""
          echo "Para subir localmente:"
          echo "  docker-compose -f docker-compose.prod.yml up -d"
          echo "============================================"
